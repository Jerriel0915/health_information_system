# 数据源配�?
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 主库数据�?
            master:
                url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ry-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia%2FShanghai}
                username: ${MYSQL_USERNAME:root}
                password: ${MYSQL_PASSWORD:Fjh20050123}
            # 从库数据�?
            slave:
                # 从数据源开�?默认关闭
                enabled: false
                url: 
                username: 
                password: 
            # 初始连接�?
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时�?
            maxWait: 60000
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有�?
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter: 
                enabled: ${DRUID_WEB_STAT_FILTER_ENABLED:true}
            statViewServlet:
                enabled: ${DRUID_STAT_VIEW_ENABLED:true}
                # 设置白名单，不填则允许所有访�?
                allow: ${DRUID_ALLOW:}
                url-pattern: /druid/*
                # 控制台管理用户名和密�?
                login-username: ${DRUID_LOGIN_USERNAME:ruoyi}
                login-password: ${DRUID_LOGIN_PASSWORD:123456}
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true

